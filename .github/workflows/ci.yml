name: CI
on:
  pull_request:
    paths:
      - '.github/workflows/ci.yml'
      - 'ext/**'
      - 'src/**'
      - 'test/**'
      - 'Project.toml'
  push:
    branches:
      - master
    tags: '*'
    paths:
      - '.github/workflows/ci.yml'
      - 'ext/**'
      - 'src/**'
      - 'test/**'
      - 'Project.toml'
jobs:
  test:
    if: github.event.pull_request.draft == false
    name: Julia ${{ matrix.version }} - ${{ matrix.os }} - ${{ matrix.backend }} - ${{ github.event_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        version:
          - '1.11'
          - '1.12'
        os:
          - ubuntu-latest
          - macOS-latest
          - windows-latest
        backend:
          - KernelAbstractions
          - SIMD
        exclude:
          # alloc tests (SIMD backend) run on Ubuntu only
          - os: macOS-latest
            backend: SIMD
          - os: windows-latest
            backend: SIMD
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
          arch: 'default'
      - uses: actions/cache@v5
        env:
          cache-name: cache-artifacts
        with:
          path: ~/.julia/artifacts
          key: ${{ runner.os }}-test-${{ env.cache-name }}-${{ hashFiles('**/Project.toml') }}
          restore-keys: |
            ${{ runner.os }}-test-${{ env.cache-name }}-
            ${{ runner.os }}-test-
            ${{ runner.os }}-
      - name: WaterLily tests
        env:
          # KernelAbstractions main tests run multithreaded per worker; SIMD alloc tests are serial.
          # (--jobs is auto-sized in runtests.jl from Sys.CPU_THREADS / WATERLILY_NTHREADS)
          WATERLILY_NTHREADS: ${{ matrix.backend == 'KernelAbstractions' && '2' || '1' }}
          WATERLILY_BACKENDS: 'cpu'
        shell: bash
        run: |
          printf "[WaterLily]\nbackend = \"${{ matrix.backend }}\"" > LocalPreferences.toml
          julia --proj --color=yes -e "using Pkg; Pkg.instantiate(); Pkg.test(; coverage=true);"
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
  docs:
    if: github.event.pull_request.draft == false
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1'
          arch: 'default'
      - run: |
          julia --project=docs -e '
            using Pkg
            Pkg.develop(PackageSpec(path=pwd()))
            Pkg.instantiate()'
      - run: |
          julia --project=docs -e '
            using Documenter: doctest
            using WaterLily
            doctest(WaterLily)'
      - run: julia --project=docs docs/make.jl
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}
